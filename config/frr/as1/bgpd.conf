! AS1 — Tier-1 Core Transit
! Neighbors: AS2 (10.0.12.2), AS3 (10.0.13.3)

hostname as1-router
log file /tmp/frr-logs/as1/bgpd.log
log timestamp precision 3

router bgp 1
  bgp router-id 1.1.1.1
  bgp log-neighbor-changes
  no bgp ebgp-requires-policy

  neighbor 10.0.12.2 remote-as 2
  neighbor 10.0.12.2 description AS2-West-ISP
  neighbor 10.0.12.2 timers 10 30

  neighbor 10.0.13.3 remote-as 3
  neighbor 10.0.13.3 description AS3-East-ISP
  neighbor 10.0.13.3 timers 10 30

  address-family ipv4 unicast
    network 1.1.1.1/32
    neighbor 10.0.12.2 activate
    neighbor 10.0.12.2 soft-reconfiguration inbound
    neighbor 10.0.13.3 activate
    neighbor 10.0.13.3 soft-reconfiguration inbound
  exit-address-family