! AS20 — Legitimate AS — owns 10.20.0.0/16
! Neighbors: AS3 (10.0.320.3)

hostname as20-legit
log file /tmp/frr-logs/as20/bgpd.log
log timestamp precision 3

router bgp 20
  bgp router-id 20.20.20.20
  bgp log-neighbor-changes
  no bgp ebgp-requires-policy

  neighbor 10.0.320.3 remote-as 3
  neighbor 10.0.320.3 description AS3-Upstream
  neighbor 10.0.320.3 timers 10 30

  address-family ipv4 unicast
    network 10.20.0.0/16
    neighbor 10.0.320.3 activate
    neighbor 10.0.320.3 soft-reconfiguration inbound
  exit-address-family