[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "src/topology/builder.py"]  # builder requires live Mininet

[tool.coverage.report]
show_missing = true
skip_covered = false